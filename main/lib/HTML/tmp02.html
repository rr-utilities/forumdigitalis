<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Minimal Grid</title>
    <style>
        body{margin:0;font-family:Arial;background:#fafafa}
        header{text-align:center;padding:60px 20px}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px}
        .card{background:white;padding:30px;border-radius:8px}
        h1{font-weight:300}
        footer{text-align:center;padding:40px;font-size:0.8rem}
    </style>
</head>

<body>

<header>
    <h1>Creative Archive</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
</header>

<div class="grid">
    <div class="card"><h3>Project One</h3><p>Lorem ipsum dolor sit amet.</p></div>
    <div class="card"><h3>Project Two</h3><p>Lorem ipsum dolor sit amet.</p></div>
    <div class="card"><h3>Project Three</h3><p>Lorem ipsum dolor sit amet.</p></div>
</div>

<footer>
    Minimal Portfolio Concept
</footer>

</body>
</html>
